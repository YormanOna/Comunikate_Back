services:
  - type: web
    name: komunikate-api
    runtime: docker
    plan: standard
    healthCheckPath: /up
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: staging
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          name: komunikate-api
          type: web
          property: hostport
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SEARCH_PATH
        value: core,people,academic,services,finance,ops,audit,public
      - key: FILESYSTEM_DISK
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: auto
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: "true"
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NOMBRES
        value: Administrador
      - key: ADMIN_APELLIDOS
        value: Sistema
      - key: ADMIN_CEDULA
        value: "0000000001"
      - key: ADMIN_CELULAR
        value: "0000000000"
      - key: ADMIN_CIUDAD
        value: Quito
